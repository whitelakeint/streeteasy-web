<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - StreetEasy Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#2563EB",
                            foreground: "#FFFFFF"
                        },
                        slate: {
                            50: "#F8FAFC",
                            100: "#F1F5F9",
                            200: "#E2E8F0",
                            400: "#94A3B8",
                            500: "#64748B",
                            900: "#0F172A"
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-slate-50 h-full flex items-center justify-center p-6">
<!-- Shell Visibility & Relevance: Suppression logic applied. 
         SideNavBar and TopNavBar are hidden for transactional/login pages per protocol. -->
<main class="w-full max-w-[420px]">
<!-- Login Card -->
<div class="bg-white border border-slate-200 rounded-xl shadow-sm p-10 flex flex-col">
<!-- Logo Section -->
<div class="mb-8 flex justify-start">
<div class="w-10 h-10 bg-primary flex items-center justify-center rounded-lg">
<span class="text-white font-black text-lg tracking-tighter">SE</span>
</div>
</div>
<!-- Header Section -->
<div class="mb-8">
<h1 class="text-2xl font-semibold text-slate-900 tracking-tight">Sign in to continue</h1>
<p class="text-slate-500 text-sm mt-1">Admin access to the StreetEasy Scraper dashboard</p>
</div>
<!-- Form Section -->
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-900 font-label" for="email">Email</label>
<input class="block w-full rounded-lg border-slate-200 bg-white px-4 py-2.5 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary sm:text-sm transition-colors" id="email" name="email" placeholder="you@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-900 font-label" for="password">Password</label>
<div class="relative">
<input class="block w-full rounded-lg border-slate-200 bg-white px-4 py-2.5 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary sm:text-sm transition-colors" id="password" name="password" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full bg-primary text-white font-medium py-2.5 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all duration-150" type="submit">
                        Sign in
                    </button>
</div>
</form>
<!-- Footnote Section -->
<div class="mt-8">
<p class="text-[12px] leading-relaxed text-slate-400 text-center">
                    Access is provisioned by the administrator. Contact your admin if you need an account.
                </p>
</div>
</div>
<!-- System Status Indicator (Subtle UI Pattern) -->
<div class="mt-8 flex justify-center items-center gap-2">
<span class="flex h-2 w-2 rounded-full bg-emerald-500"></span>
<span class="text-xs font-medium text-slate-500 tracking-wide uppercase">All systems operational</span>
</div>
</main>
</body></html>
